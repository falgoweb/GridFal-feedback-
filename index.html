<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GridFal Beta Testing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🚀 GridFal Beta Testing</h1>

    <p>
      Bantu kami menguji GridFal selama 5-10 menit dan berikan feedback setelah mencoba.
    </p>

    <h2>Tugas Testing</h2>

    <ol>
      <li>Buat tabel 3 kolom dan 5 baris</li>
      <li>Isi beberapa data</li>
      <li>Coba Undo & Redo</li>
      <li>Coba Search</li>
      <li>Export PDF</li>
      <li>Export Excel</li>
    </ol>

    <a href="LINK_GRIDFAL_KAMU" target="_blank">
      <button>🌐 Buka GridFal</button>
    </a>

    <hr>

    <h2>Feedback</h2>

    <label>Kemudahan penggunaan (1-10)</label>
    <input type="number" min="1" max="10">

    <label>Fitur favorit</label>
    <textarea rows="3"></textarea>

    <label>Bagian yang membingungkan</label>
    <textarea rows="3"></textarea>

    <label>Saran tambahan</label>
    <textarea rows="3"></textarea>

    <button>📨 Kirim Feedback</button>
  </div>

</body>
</html>
